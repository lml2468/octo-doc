name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Format check
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then echo "unformatted files:"; echo "$fmt"; exit 1; fi
      - name: Vet
        run: go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
      - name: Build
        run: go build ./...
      - name: Unit tests (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  integration:
    # Run the storage contract + e2e suites against real PostgreSQL + MinIO —
    # proves the pg+s3 stack works end to end. PostgreSQL is a service container;
    # MinIO is started as a step (the official image needs a `server` command,
    # which service containers can't override).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: octo
          POSTGRES_PASSWORD: octo
          POSTGRES_DB: octodoc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U octo" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      OCTO_TEST_DATABASE_URL: postgres://octo:octo@localhost:5432/octodoc
      OCTO_TEST_S3_BUCKET: octo-test
      OCTO_TEST_S3_ENDPOINT: http://localhost:9000
      OCTO_TEST_S3_ACCESS_KEY_ID: minioadmin
      OCTO_TEST_S3_SECRET_ACCESS_KEY: minioadmin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Start MinIO + create bucket
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          # Wait for readiness.
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9000/minio/health/live >/dev/null; then break; fi
            sleep 1
          done
          # Create the test bucket via the MinIO client.
          docker run --rm --network host --entrypoint sh minio/mc -c '
            mc alias set local http://localhost:9000 minioadmin minioadmin &&
            mc mb --ignore-existing local/octo-test'
      - name: Integration + e2e (pg + s3)
        run: go test ./internal/storage/... ./test/e2e/...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/Dockerfile -t octo-doc:ci .

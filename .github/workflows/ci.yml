name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Format check
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then echo "unformatted files:"; echo "$fmt"; exit 1; fi
      - name: Vet
        run: go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.6.0
      - name: Build
        run: go build ./...
      - name: Unit tests (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  integration:
    # Run the storage contract + e2e suites against real PostgreSQL + MinIO
    # service containers — proves the pg+s3 stack works end to end.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: octo
          POSTGRES_PASSWORD: octo
          POSTGRES_DB: octodoc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U octo" --health-interval 5s
          --health-timeout 5s --health-retries 10
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: octo-test
        ports: ["9000:9000"]
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      OCTO_TEST_DATABASE_URL: postgres://octo:octo@localhost:5432/octodoc
      OCTO_TEST_S3_BUCKET: octo-test
      OCTO_TEST_S3_ENDPOINT: http://localhost:9000
      OCTO_TEST_S3_ACCESS_KEY_ID: minioadmin
      OCTO_TEST_S3_SECRET_ACCESS_KEY: minioadmin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Integration + e2e (pg + s3)
        run: go test ./internal/storage/... ./test/e2e/...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/Dockerfile -t octo-doc:ci .

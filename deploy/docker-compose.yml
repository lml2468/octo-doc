# octo-doc — one-command self-host: `docker compose -f deploy/docker-compose.yml up -d`
#
# Default profile (no profiles flag): app + Caddy reverse proxy with automatic
# TLS. Storage is SQLite + local FS on a named volume — zero external services.
#
# Optional profiles:
#   --profile postgres   add Postgres and switch metadata storage to it
#   --profile minio      add MinIO and switch blob storage to S3
# Combine both for the full postgres+s3 stack (used by the adapter-swap E2E).

name: octo-doc

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ghcr.io/lml2468/octo-doc:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      DATA_DIR: /data
      STORAGE: ${STORAGE:-sqlite+fs}
      BASE_URL: ${BASE_URL:-}
      WRITE_TOKEN: ${WRITE_TOKEN:-}
      ALLOW_BOOTSTRAP: ${ALLOW_BOOTSTRAP:-true}
      PRIVATE: ${PRIVATE:-false}
      FRAME_ANCESTORS: ${FRAME_ANCESTORS:-'none'}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Postgres (used only when STORAGE=postgres+...)
      DATABASE_URL: ${DATABASE_URL:-}
      # S3/MinIO (used only when STORAGE=...+s3)
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-octo-doc}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    volumes:
      - app-data:/data
    # Exposed on the host for the short_test (curl localhost:8080). In a pure
    # TLS deployment you can drop this and reach the app only via Caddy.
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      # Set DOMAIN to your real hostname for automatic Let's Encrypt TLS.
      # Leave unset to serve plain HTTP on :80 (local testing).
      DOMAIN: ${DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-octo}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-octo}
      POSTGRES_DB: ${PG_DB:-octodoc}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-octo}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    profiles: ["minio"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  app-data:
  caddy-data:
  caddy-config:
  pg-data:
  minio-data:
